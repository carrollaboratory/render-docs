# ============================================================
# Design Document Template
# claude.ai | AI-Assisted Design Document
# ============================================================

metadata:
  title: "[Project Title]"
  version: "0.1.0"
  status: draft # draft | review | approved
  created: "YYYY-MM-DD"
  updated: "YYYY-MM-DD"
  author: "[Author Name]"
  reviewers: []

# ============================================================
# 1. OVERVIEW
# ============================================================
overview:
  summary: >
    [One paragraph describing what this project does and why it exists.]
  goals:
    - "[Primary goal]"
    - "[Secondary goal]"
  non_goals:
    - "[What this project explicitly does NOT do]"

# ============================================================
# 2. CONTEXT & MOTIVATION
# ============================================================
context:
  background: >
    [Describe the problem space and what prompted this work.]
  motivation: >
    [Why solve it now? What happens if it isn't solved?]
  references:
    - label: "[Reference name]"
      url: "[URL or doc path]"

# ============================================================
# 3. SCOPE
# ============================================================
scope:
  in_scope:
    - "[Thing that is in scope]"
  out_of_scope:
    - "[Thing that is out of scope]"
  constraints:
    - "[Technical, time, or resource constraint]"
  assumptions:
    - "[Assumption being made]"

# ============================================================
# 4. STAKEHOLDERS
# ============================================================
stakeholders:
  - role: Developer
    name: "[Name]"
    responsibilities:
      - "[Responsibility]"

# ============================================================
# 5. TECHNICAL DESIGN
# ============================================================
technical_design:
  architecture:
    description: >
      [High-level description of how the system is structured.]
    components:
      - name: "[Component name]"
        description: "[What this component does]"
        technology: "[Language / framework / tool]"

  data_model:
    description: >
      [Describe the data model or schema in use, if applicable.]
    entities:
      - name: "[Entity name]"
        description: "[What this entity represents]"

  interfaces:
    inputs:
      - name: "[Input name]"
        format: "[File type, API, CLI arg, etc.]"
        description: "[What this input is]"
    outputs:
      - name: "[Output name]"
        format: "[File type, API, etc.]"
        description: "[What this output is]"

  dependencies:
    internal: []
    external:
      - name: "[Library / tool name]"
        version: "[Version or range]"
        purpose: "[Why it is needed]"

# ============================================================
# 6. IMPLEMENTATION APPROACH
# ============================================================
implementation:
  strategy: >
    [Describe the overall implementation strategy at a high level.]
  phases:
    - phase: 1
      name: "[Phase name]"
      description: "[What gets done in this phase]"
  error_handling: >
    [How errors, edge cases, and failures will be handled.]
  logging: >
    [What will be logged and at what verbosity levels.]

# ============================================================
# 7. TESTING STRATEGY
# ============================================================
testing:
  approach: >
    [Unit, integration, manual — describe the strategy.]
  test_cases:
    - id: TC-001
      description: "[What is being tested]"
      expected_result: "[What success looks like]"
  acceptance_criteria:
    - "[Criterion that must be true before this is considered done]"

# ============================================================
# 8. RISKS & MITIGATIONS
# ============================================================
risks:
  - id: R-001
    description: "[Risk description]"
    likelihood: low # low | medium | high
    impact: low # low | medium | high
    mitigation: "[How this risk is mitigated]"

# ============================================================
# 9. OPEN QUESTIONS
# ============================================================
open_questions:
  - id: Q-001
    question: "[Unresolved question]"
    owner: "[Who will resolve it]"
    due: "YYYY-MM-DD"

# ============================================================
# 10. DECISION LOG
# ============================================================
decision_log:
  - id: D-001
    date: "YYYY-MM-DD"
    decision: "[What was decided]"
    rationale: "[Why this decision was made]"
    alternatives_considered:
      - "[Alternative that was not chosen]"

# ============================================================
# 11. APPENDIX
# ============================================================
appendix:
  glossary:
    - term: "[Term]"
      definition: "[Definition]"
  diagrams: []
  notes: >
    [Any additional free-form notes.]
